name: 17 - using composite actions in github actions
on:
  workflow_dispatch:

env:
  working-directory: .github/workflows/17-custom-actions/react-app
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node and Cache dependencies
        uses: ./.github/actions/composite-cache-deps
        with:
          node-version: '20.x'
          working-directory: ${{env.working-directory}}

      - name: Testing
        run: npm run test
        working-directory: ${{env.working-directory}}

      - name: build
        run: npm run build
        working-directory: ${{env.working-directory}}

   